name: Build worker image (Packer)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment to use for the worker build. Staging dispatches also roll the persistent worker forward."
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      screaming_frog_deb_gs_uri:
        description: "Optional gs:// URI of the Screaming Frog CLI .deb (must be readable by the Packer builder SA). Falls back to SCREAMING_FROG_DEB_GS_URI."
        required: false
        type: string
      zone:
        description: "GCE zone for the temporary build VM."
        required: false
        default: "us-central1-a"
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/packer-build.yml"
      - "infra/packer/**"
      - "infra/main.tf"
      - "infra/variables.tf"
      - "infra/modules/gce-image/**"
      - "infra/templates/worker-startup.sh.tftpl"
      - "api/app/**"
      - "api/crawler/**"
      - "api/requirements.txt"

permissions:
  contents: read
  id-token: write

concurrency:
  group: packer-worker-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

jobs:
  packer:
    name: Packer build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    outputs:
      image_name: ${{ steps.image.outputs.image_name }}
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_version: ${{ steps.image.outputs.image_version }}
      deploy_environment: ${{ steps.image.outputs.deploy_environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      DEFAULT_DEB_URI: ${{ vars.SCREAMING_FROG_DEB_GS_URI }}
      INPUT_DEB_URI: ${{ github.event.inputs.screaming_frog_deb_gs_uri }}
      INPUT_ZONE: ${{ github.event.inputs.zone }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Packer auth inputs
        env:
          PACKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
        run: |
          if [ -z "${PACKER_SERVICE_ACCOUNT_EMAIL}" ]; then
            echo "Missing required environment secret GCP_PACKER_SERVICE_ACCOUNT_EMAIL for ${DEPLOY_ENVIRONMENT}."
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: "1.11.2"

      - name: Initialize Packer plugins
        working-directory: infra/packer
        run: packer init worker.pkr.hcl

      - name: Resolve build inputs
        run: |
          set -euo pipefail

          DEB_URI="${DEFAULT_DEB_URI}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            DEB_URI="${INPUT_DEB_URI:-${DEFAULT_DEB_URI}}"
          fi

          if [ -z "${DEB_URI}" ]; then
            echo "Missing deb URI: set SCREAMING_FROG_DEB_GS_URI (path triggers) or pass workflow input."
            exit 1
          fi

          ZONE="${INPUT_ZONE:-us-central1-a}"
          IMAGE_NAME="frog-worker-${GITHUB_SHA}"
          NETWORK="${DEPLOY_ENVIRONMENT}-frog-vpc"
          SUBNETWORK="${DEPLOY_ENVIRONMENT}-frog-subnet"

          gcloud compute networks describe "${NETWORK}" --project="${GCP_PROJECT_ID}" --format="value(name)" >/dev/null
          gcloud compute networks subnets describe "${SUBNETWORK}" --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --format="value(name)" >/dev/null

          {
            echo "DEB_URI=${DEB_URI}"
            echo "ZONE=${ZONE}"
            echo "IMAGE_NAME=${IMAGE_NAME}"
            echo "NETWORK=${NETWORK}"
            echo "SUBNETWORK=${SUBNETWORK}"
          } >> "${GITHUB_ENV}"

      - name: Validate template
        working-directory: infra/packer
        run: |
          packer validate             -var=project_id="${GCP_PROJECT_ID}"             -var=zone="${ZONE}"             -var=image_version="${GITHUB_SHA}"             -var=network="${NETWORK}"             -var=subnetwork="${SUBNETWORK}"             -var=screaming_frog_deb_gs_uri="${DEB_URI}"             worker.pkr.hcl

      - name: Build image
        working-directory: infra/packer
        run: |
          set -euo pipefail
          packer build             -var=project_id="${GCP_PROJECT_ID}"             -var=zone="${ZONE}"             -var=image_version="${GITHUB_SHA}"             -var=network="${NETWORK}"             -var=subnetwork="${SUBNETWORK}"             -var=screaming_frog_deb_gs_uri="${DEB_URI}"             worker.pkr.hcl
      - id: image
        name: Resolve image reference
        run: |
          set -euo pipefail
          IMAGE_NAME="${IMAGE_NAME:-frog-worker-${GITHUB_SHA}}"
          IMAGE_REF="projects/${GCP_PROJECT_ID}/global/images/${IMAGE_NAME}"
          gcloud compute images describe "${IMAGE_NAME}" --project="${GCP_PROJECT_ID}" --format="value(name)" >/dev/null
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"
          echo "image_version=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "deploy_environment=${DEPLOY_ENVIRONMENT}" >> "${GITHUB_OUTPUT}"

      - name: Image summary
        run: |
          echo "Built worker image ${IMAGE_NAME}."
          echo "Resolved worker image ref: ${{ steps.image.outputs.image_ref }}"

  rollout-staging:
    name: Roll out persistent worker (staging)
    runs-on: ubuntu-latest
    needs: [packer]
    if: needs.packer.outputs.deploy_environment == 'staging' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    environment: staging
    env:
      BUILT_WORKER_IMAGE: ${{ needs.packer.outputs.image_ref }}
      BUILT_WORKER_RELEASE_SHA: ${{ needs.packer.outputs.image_version }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ZONE: ${{ vars.GCP_ZONE }}
      CLOUD_RUN_SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
      TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_STATE_PREFIX: ${{ vars.TERRAFORM_STATE_PREFIX }}
      DATABASE_URL_SECRET_ID: ${{ secrets.GCP_DATABASE_URL_SECRET_ID }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.2"

      - name: Prepare Terraform inputs
        working-directory: infra
        run: |
          set -euo pipefail

          ENVIRONMENT="staging"
          GCP_ZONE="${GCP_ZONE:-us-central1-a}"
          TERRAFORM_STATE_PREFIX="${TERRAFORM_STATE_PREFIX:-frog-in-the-cloud/${ENVIRONMENT}}"
          WORKER_INSTANCE_NAME="${ENVIRONMENT}-frog-worker-persistent"

          if [ -z "${TERRAFORM_STATE_BUCKET}" ]; then
            echo "Missing TERRAFORM_STATE_BUCKET GitHub environment variable."
            exit 1
          fi

          if [ -z "${GCP_PROJECT_ID}" ] || [ -z "${GCP_REGION}" ] || [ -z "${CLOUD_RUN_SERVICE_NAME}" ] || [ -z "${DATABASE_URL_SECRET_ID}" ]; then
            echo "Missing one or more required staging rollout values."
            exit 1
          fi

          CURRENT_API_IMAGE="$(gcloud run services describe "${CLOUD_RUN_SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(spec.template.spec.containers[0].image)')"

          DB_URL="$(gcloud secrets versions access latest --secret="${DATABASE_URL_SECRET_ID}")"
          export DB_URL
          DB_PASSWORD="$(python -c 'import os; from urllib.parse import unquote, urlsplit; db_url = os.environ["DB_URL"].strip(); parsed = urlsplit(db_url); password = parsed.password or ""; assert password, "Failed to parse db password from DATABASE_URL secret."; print(unquote(password), end="")')"

          CLERK_SECRET_KEY="$(gcloud secrets versions access latest --secret="${ENVIRONMENT}-frog-clerk-secret-key")"
          CLERK_WEBHOOK_SECRET="$(gcloud secrets versions access latest --secret="${ENVIRONMENT}-frog-clerk-webhook-secret")"
          SF_LICENSE_KEY="$(gcloud secrets versions access latest --secret="${ENVIRONMENT}-frog-sf-license-key")"

          append_env() {
            local key="$1"
            local value="$2"
            local delimiter="__FROG_EOF_$(date +%s%N)__"
            {
              echo "${key}<<${delimiter}"
              printf '%s\n' "${value}"
              echo "${delimiter}"
            } >> "${GITHUB_ENV}"
          }

          {
            echo "GCP_ZONE=${GCP_ZONE}"
            echo "WORKER_INSTANCE_NAME=${WORKER_INSTANCE_NAME}"
            echo "TERRAFORM_STATE_PREFIX=${TERRAFORM_STATE_PREFIX}"
            echo "TF_IN_AUTOMATION=true"
            echo "TF_VAR_project_id=${GCP_PROJECT_ID}"
            echo "TF_VAR_region=${GCP_REGION}"
            echo "TF_VAR_zone=${GCP_ZONE}"
            echo "TF_VAR_environment=${ENVIRONMENT}"
            echo "TF_VAR_cloud_run_image=${CURRENT_API_IMAGE}"
            echo "TF_VAR_terraform_state_bucket=${TERRAFORM_STATE_BUCKET}"
            echo "TF_VAR_terraform_state_prefix=${TERRAFORM_STATE_PREFIX}"
            echo "TF_VAR_worker_source_image=${BUILT_WORKER_IMAGE}"
            echo "TF_VAR_worker_release_sha=${BUILT_WORKER_RELEASE_SHA}"
          } >> "${GITHUB_ENV}"

          append_env "TF_VAR_db_password" "${DB_PASSWORD}"
          append_env "TF_VAR_clerk_secret_key" "${CLERK_SECRET_KEY}"
          append_env "TF_VAR_clerk_webhook_secret" "${CLERK_WEBHOOK_SECRET}"
          append_env "TF_VAR_sf_license_key" "${SF_LICENSE_KEY}"

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${TERRAFORM_STATE_BUCKET}" \
            -backend-config="prefix=${TERRAFORM_STATE_PREFIX}"

      - name: Terraform plan (staging worker rollout)
        working-directory: infra
        run: |
          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -out=tfplan \
            -target=module.gce_image \
            -target=google_compute_instance.persistent_worker

      - name: Terraform apply (staging worker rollout)
        working-directory: infra
        run: terraform apply -input=false -auto-approve tfplan

      - name: Verify staging worker metadata
        run: |
          set -euo pipefail
          INSTANCE_JSON="$(mktemp)"
          gcloud compute instances describe "${WORKER_INSTANCE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --zone="${GCP_ZONE}" \
            --format=json > "${INSTANCE_JSON}"

          python -c 'import json, sys; instance_path, expected_image, expected_sha = sys.argv[1:4]; data = json.load(open(instance_path, "r", encoding="utf-8")); metadata = {item["key"]: item.get("value", "") for item in data.get("metadata", {}).get("items", [])}; status = data.get("status"); actual_image = metadata.get("worker_source_image"); actual_sha = metadata.get("worker_release_sha"); problems = []; problems.append(f"status={status!r}") if status != "RUNNING" else None; problems.append(f"worker_source_image={actual_image!r}") if actual_image != expected_image else None; problems.append(f"worker_release_sha={actual_sha!r}") if actual_sha != expected_sha else None; (_ for _ in ()).throw(SystemExit("Staging worker metadata verification failed: " + ", ".join(problems))) if problems else None; print(f"Verified staging worker metadata: release={actual_sha} image={actual_image}")' "${INSTANCE_JSON}" "${BUILT_WORKER_IMAGE}" "${BUILT_WORKER_RELEASE_SHA}"

      - name: Verify startup markers
        run: |
          set -euo pipefail
          for attempt in $(seq 1 10); do
            SERIAL_OUTPUT="$(gcloud compute instances get-serial-port-output "${WORKER_INSTANCE_NAME}" \
              --project="${GCP_PROJECT_ID}" \
              --zone="${GCP_ZONE}" \
              --port=1 2>/dev/null | tail -n 200)"

            if printf '%s\n' "${SERIAL_OUTPUT}" | grep -F "frog-worker.service active: active" >/dev/null && \
              printf '%s\n' "${SERIAL_OUTPUT}" | grep -F "Worker bootstrap complete for release ${BUILT_WORKER_RELEASE_SHA}" >/dev/null; then
              echo "Verified startup markers for ${BUILT_WORKER_RELEASE_SHA}."
              exit 0
            fi

            sleep 15
          done

          echo "Did not find the expected worker startup markers in serial output."
          exit 1
